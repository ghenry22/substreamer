name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typecheck-and-test:
    name: TypeScript & Jest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript compilation check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx jest --no-coverage --ci
